name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            echo "依赖安装失败，请检查requirements.txt文件"
            exit 1
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # 打包命令：包含图标和备用二维码图片
          pyinstaller --clean --windowed --onefile \
            --icon=app_icon.ico \
            --add-data "wechat_default.png:." \
            --name="剪映小助手" \
            jianying_v3.py

      - name: Verify build output
        run: |
          if [ -d "dist/剪映小助手.app" ]; then
            echo "打包成功，产物路径：dist/剪映小助手.app"
            ls -la dist/
          else
            echo "打包失败，未找到.app文件"
            exit 1
          fi

      - name: Create app zip
        run: |
          cd dist
          zip -r 剪映小助手-macOS.zip 剪映小助手.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 剪映小助手-macOS
          path: dist/剪映小助手-macOS.zip
          retention-days: 30
